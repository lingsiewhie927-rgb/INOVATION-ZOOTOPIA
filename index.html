<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐰 疯狂动物城·拔河对战（完整功能版）🦊</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e0f2fe;
            height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .admin-bar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid #bae6fd;
            z-index: 100;
            flex-shrink: 0;
        }
        .choice-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .choice-btn:active {
            transform: scale(0.97);
        }
        .battlefield {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }
        .rope-container {
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            overflow: visible;
            gap: 0;
        }
        .rope {
            height: 22px;
            background: #795548;
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent);
            background-size: 24px 24px;
            border-radius: 40px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.25);
            border: 3px solid #3e2723;
            width: 380px;
            flex-shrink: 0;
            position: relative;
        }
        .fixed-center-dash {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 300px;
            background: repeating-linear-gradient(to bottom, #64748b 0px, #64748b 12px, transparent 12px, transparent 24px);
            z-index: 15;
            pointer-events: none;
            opacity: 0.7;
        }
        .rope-marker {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            pointer-events: none;
        }
        .rope-marker>div {
            width: 12px;
            height: 110px;
            background: linear-gradient(to bottom, #fde047, #f59e0b);
            border: 4px solid white;
            border-radius: 20px;
        }
        @keyframes pull-feedback {
            0% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.05) rotate(-2deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }
        .pull-anim {
            animation: pull-feedback 0.3s ease-out;
        }
        .character {
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.2));
            flex-shrink: 0;
            width: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .character svg {
            width: 130px;
            height: auto;
            pointer-events: none;
        }
        .modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0) rotate(var(--base-rot));
            }
            50% {
                transform: translateY(-8px) rotate(var(--base-rot));
            }
        }
        .idle-float {
            animation: float 4s infinite ease-in-out;
        }
        .table-wrapper {
            max-height: 400px;
            overflow-y: auto;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
        }
        .edit-table th {
            background: #f8fafc;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #334155;
        }
        .batch-panel {
            background: #fefce8;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 2px solid #fde047;
        }
        .password-eye {
            cursor: pointer;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            user-select: none;
        }
        .lock-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            backdrop-filter: blur(12px);
        }
        .disabled-btn {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(0.1);
        }
        .random-order-hint {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 4px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- 顶部管理栏 -->
    <header class="admin-bar p-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex gap-2">
                <button id="timeBtn" class="px-4 py-1.5 bg-white border-2 border-blue-200 rounded-xl text-blue-700 font-bold text-sm hover:bg-blue-50 shadow-sm">⏱ 时长</button>
                <button id="quizBtn" class="px-4 py-1.5 bg-white border-2 border-blue-200 rounded-xl text-blue-700 font-bold text-sm hover:bg-blue-50 shadow-sm">📚 题库</button>
                <button id="changePwdBtn" class="px-4 py-1.5 bg-white border-2 border-purple-200 rounded-xl text-purple-700 font-bold text-sm hover:bg-purple-50 shadow-sm">🔑 改密码</button>
                <button id="generateHtmlBtn" class="px-4 py-1.5 bg-white border-2 border-emerald-200 rounded-xl text-emerald-700 font-bold text-sm hover:bg-emerald-50 shadow-sm">💾 生成HTML</button>
            </div>
            <div class="text-center">
                <h1 class="text-xl font-black text-slate-800 tracking-tight">ZOOTOPIA <span class="text-blue-600">TUG</span>·<span class="text-orange-500">WAR</span><span class="text-xs ml-1">⏱️ 完整功能版</span></h1>
            </div>
            <div class="flex gap-2">
                <button id="resetBtn" class="px-4 py-1.5 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm hover:bg-slate-200 border border-slate-200">🔄 重置</button>
                <button id="startBtn" class="bg-blue-600 text-white py-1.5 px-7 rounded-xl font-black text-sm shadow-lg hover:bg-blue-700 transition">⚡ 开始对战</button>

        </div>
    </header>

    <!-- 时长弹窗 -->
    <div id="time-modal" class="modal-overlay">

            <h3 class="font-black text-slate-800 mb-4 text-center text-2xl">⏳ 比赛时间 (10~600秒)</h3>
            <input type="number" id="setup-time" value="240" min="10" max="600" step="5" class="w-full px-4 py-5 border-4 border-slate-100 rounded-3xl outline-none focus:border-blue-500 font-black text-center text-5xl text-slate-700">

        </div>

    <!-- 题库弹窗 -->
    <div id="ques-modal" class="modal-overlay">

            </div>

            <div class="flex justify-end mt-5"><button id="saveQuesBtn" class="bg-orange-500 text-white px-8 py-3 rounded-2xl font-black shadow-md">💾 保存并关闭</button></div>
        </div>
    </div>

    <!-- 密码相关模态框 -->
    <div id="password-modal" class="modal-overlay" style="z-index: 1100;">
        <div class="bg-white rounded-3xl shadow-2xl w-96 p-6 border-4 border-indigo-200">

                <h3 class="font-black text-2xl">🔐 管理员验证</h3>

    <script>
        (function() {
            "use strict";

            // ========== 文本规范化 ==========
            function normalizeText(str) {
                if (!str) return '';
                let s = String(str);
                s = s.replace(/[\u200B-\u200D\uFEFF]/g, '');
                s = s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
                s = s.replace(/　/g, ' ');
                s = s.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
                s = s.replace(/\s+/g, ' ');
                return s.trim();
            }

            function isAnswerEqual(userAns, correctAns) {
                return normalizeText(userAns) === normalizeText(correctAns);
            }

            // ========== 默认题库（15道环保与科学题） ==========

                { "q": "地球的深处其实是很热的，对吗？", "a": "对", "b": "不对", "c": "很冷", "d": "像冰块", "correct": "对" }
            ];

            // ========== 密码管理（完整功能） ==========
            let passwordUnlocked = false,
                remainingAttempts = 5,
                isWaiting = false,
                waitTimeout = null,
                pendingModalId = null,
                globalLocked = false;
            let currentPassword = localStorage.getItem('zootopia_admin_pwd') || "0987";

            function savePasswordToLocal(pwd) { localStorage.setItem('zootopia_admin_pwd', pwd);
                currentPassword = pwd; }

            function processWrongPassword() { if (globalLocked) return;
                remainingAttempts--;
                updateAttemptsDisplay(); if (remainingAttempts <= 0) permanentLock();
                else startWaitPenalty(5); }

            function startWaitPenalty(seconds) { if (isWaiting) return;
                isWaiting = true;
                let remain = seconds;
                const updateTimer = () => { const span = document.getElementById('wait-timer'); if (span) span.innerText =
                        `⏳ 等待 ${remain}s`; if (remain <= 0) clearWaitState();
                    else { waitTimeout = setTimeout(() => { remain--;
                        updateTimer(); }, 1000); } };
                updateTimer(); }

            function clearWaitState() { if (waitTimeout) clearTimeout(waitTimeout);
                waitTimeout = null;
                isWaiting = false;
                const w = document.getElementById('wait-timer'); if (w) w.innerText = ''; document.getElementById(
                    'confirm-pwd-btn').disabled = false;
                document.getElementById('password-input').disabled = false;
                document.getElementById('confirm-change-btn').disabled = false; }

            function updateAttemptsDisplay() { const a = document.getElementById('attempts-left'); if (a) a.innerText =
                    `剩余次数: ${remainingAttempts}`; if (remainingAttempts <= 0) permanentLock(); }

            function permanentLock() { if (globalLocked) return;
                globalLocked = true;
                passwordUnlocked = false;
                document.getElementById('global-lock').style.display = 'flex'; ['timeBtn', 'quizBtn', 'changePwdBtn',
                    'generateHtmlBtn', 'startBtn', 'resetBtn'
                ].forEach(id => { const btn = document.getElementById(id); if (btn) btn.disabled = true; }); }

            function verifyPasswordAndUnlock(inputPwd, onSuccess) { if (globalLocked) return false; if (isWaiting) { alert(
                        "等待惩罚结束"); return false; } if (inputPwd === currentPassword) { remainingAttempts = 5;
                    updateAttemptsDisplay();
                    passwordUnlocked = true;
                    clearWaitState(); if (onSuccess) onSuccess(); return true; } else { processWrongPassword(); return false; } }

            function showPasswordModal(modalId) { if (globalLocked) return;
                pendingModalId = modalId;
                document.getElementById('password-modal').style.display = 'flex';
                document.getElementById('password-input').value = ''; }

            function closePasswordModal() { document.getElementById('password-modal').style.display = 'none';
                pendingModalId = null; }

            function handlePasswordConfirm() { const entered = document.getElementById('password-input').value;
                verifyPasswordAndUnlock(entered, () => { document.getElementById('password-modal').style.display = 'none'; if (
                        pendingModalId) { document.getElementById(pendingModalId).style.display = 'flex';
                        pendingModalId = null; } }); }

            function openChangePwdModal() { if (globalLocked) return; if (!passwordUnlocked) { showPasswordModal(
                    'change-pwd-modal'); return; } document.getElementById('change-pwd-modal').style.display = 'flex'; }

            function closeChangePwdModal() { document.getElementById('change-pwd-modal').style.display = 'none'; }

            function handleChangePassword() { if (globalLocked) return; if (isWaiting) { alert("请等待"); return; } const cur =
                    document.getElementById('current-pwd').value,
                    newp = document.getElementById('new-pwd').value,
                    conf = document.getElementById('confirm-pwd').value; if (cur !== currentPassword) {
                    processWrongPassword();
                    alert("当前密码错误"); return; } if (!newp || newp.length < 4) { alert("新密码至少4位"); return; } if (newp !==
                    conf) { alert("不一致"); return; }
                savePasswordToLocal(newp);
                alert("修改成功");
                closeChangePwdModal();
                passwordUnlocked = true; }
            document.getElementById('confirm-pwd-btn').onclick = handlePasswordConfirm;
            document.getElementById('cancel-pwd-btn').onclick = closePasswordModal;
            document.getElementById('toggle-password').onclick = () => { let inp = document.getElementById('password-input');
                inp.type = inp.type === 'password' ? 'text' : 'password'; };
            document.getElementById('toggle-current').onclick = () => { let inp = document.getElementById('current-pwd'); inp
                    .type = inp.type === 'password' ? 'text' : 'password'; };
            document.getElementById('toggle-new').onclick = () => { let inp = document.getElementById('new-pwd');
                inp.type = inp.type === 'password' ? 'text' : 'password'; };
            document.getElementById('toggle-confirm').onclick = () => { let inp = document.getElementById('confirm-pwd');
                inp.type = inp.type === 'password' ? 'text' : 'password'; };
            document.getElementById('confirm-change-btn').onclick = handleChangePassword;
            document.getElementById('cancel-change-btn').onclick = closeChangePwdModal;
            document.getElementById('changePwdBtn').onclick = openChangePwdModal;
            document.getElementById('timeBtn').onclick = () => { if (globalLocked) return; if (passwordUnlocked) document
                    .getElementById('time-modal').style.display = 'flex';
                else showPasswordModal('time-modal'); };
            document.getElementById('quizBtn').onclick = () => { if (globalLocked) return; if (passwordUnlocked) { document
                    .getElementById('ques-modal').style.display = 'flex';
                    refreshTableDisplay(); } else showPasswordModal('ques-modal'); };

            // ========== 时长管理 ==========
            const timeInput = document.getElementById('setup-time');

            function getStoredDuration() {
                const saved = localStorage.getItem('zootopia_game_duration');
                if (saved) { let parsed = parseInt(saved); if (!isNaN(parsed) && parsed >= 10 && parsed <= 600) return parsed; }
                return 240;
            }

            function setDurationAndSave(seconds) {
                let val = Math.min(600, Math.max(10, seconds));
                localStorage.setItem('zootopia_game_duration', val);
                timeInput.value = val;
                if (gameState && !gameState.active) {
                    gameState.maxTime = val;
                    gameState.timeLeft = val;
                    updateTimerDisplay();
                }
            }

            function loadSavedTime() {
                let defaultVal = getStoredDuration();
                timeInput.value = defaultVal;
                if (gameState && !gameState.active) {
                    gameState.maxTime = defaultVal;
                    gameState.timeLeft = defaultVal;
                    updateTimerDisplay();
                }
            }
            document.getElementById('saveTimeBtn').onclick = () => {
                let val = parseInt(timeInput.value);
                if (isNaN(val)) val = getStoredDuration();
                val = Math.min(600, Math.max(10, val));
                setDurationAndSave(val);
                document.getElementById('time-modal').style.display = 'none';
                alert(`时长已设为 ${val} 秒，已自动保存。`);
            };

            // ========== 游戏状态 ==========
            let gameState = { pool: [], team1Remaining: [], team2Remaining: [], score1: 0, score2: 0, timeLeft: 240,
                maxTime: 240, active: false, ropePos: 0, timerInterval: null, gameLog: { team1: [], team2: [] },
                pendingTimeouts: [] };

            const domGame = {
                timer: document.getElementById('timer'),
                q1: document.getElementById('q1'),
                q2: document.getElementById('q2'),
                o1: document.getElementById('opts1'),
                o2: document.getElementById('opts2'),
                rope: document.getElementById('rope-move-container'),
                gameOver: document.getElementById('game-over'),
                winText: document.getElementById('winner-text'),
                finalRes: document.getElementById('final-stats'),
                score1: document.getElementById('score1'),
                score2: document.getElementById('score2'),
                charJudy: document.getElementById('char-blue'),
                charNick: document.getElementById('char-red'),
                tableBody: document.getElementById('questions-table-body'),
                judyReport: document.getElementById('judy-report'),
                nickReport: document.getElementById('nick-report'),
                downloadBtn: document.getElementById('downloadPdfBtn'),
                playAgainBtn: document.getElementById('playAgainBtn')
            };

            function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;',
                    '>': '&gt;' }[c])); }

            // 题库表格操作
            function addQuestionRow(prefill = null) {
                const row = document.createElement('tr');
                row.className = 'border-b';
                const vals = prefill || { q: '', a: '', b: '', c: '', d: '', correct: '' };
                row.innerHTML =
                    `<td class="p-2"><input type="text" value="${escapeHtml(vals.q)}" class="question-input w-full"></td>
             <td class="p-2"><input type="text" value="${escapeHtml(vals.a)}" class="opt-a w-full"></td>
             <td class="p-2"><input type="text" value="${escapeHtml(vals.b)}" class="opt-b w-full"></td>
             <td class="p-2"><input type="text" value="${escapeHtml(vals.c)}" class="opt-c w-full"></td>
             <td class="p-2"><input type="text" value="${escapeHtml(vals.d)}" class="opt-d w-full"></td>
             <td class="p-2"><select class="correct-select w-full"></select></td>
             <td class="p-2 text-center"><button class="del-row text-red-400 font-bold text-lg">🗑️</button></td>`;
                domGame.tableBody.appendChild(row);
                const select = row.querySelector('.correct-select');
                const inps = [row.querySelector('.opt-a'), row.querySelector('.opt-b'), row.querySelector('.opt-c'), row
                    .querySelector('.opt-d')
                ];
                const updateSelect = () => {
                    const opts = inps.map(inp => normalizeText(inp.value));
                    select.innerHTML = opts.map((opt, idx) =>
                        `<option value="${escapeHtml(opt)}">${String.fromCharCode(65+idx)}: ${escapeHtml(opt)}</option>`
                    ).join('');
                    const normalizedCorrect = normalizeText(vals.correct);
                    if (opts.includes(normalizedCorrect)) select.value = normalizedCorrect;
                };
                inps.forEach(i => i.addEventListener('input', updateSelect));
                updateSelect();
                row.querySelector('.del-row').onclick = () => row.remove();
                return row;
            }

            function resetDefaultTable() { domGame.tableBody.innerHTML = '';
                DEFAULT_QUESTIONS.forEach(q => addQuestionRow({ q: q.q, a: q.a, b: q.b, c: q.c, d: q.d, correct: q.correct })); }

            function collectTableData() {
                return Array.from(domGame.tableBody.querySelectorAll('tr')).map(row => {
                    let opts = [
                        normalizeText(row.querySelector('.opt-a').value),
                        normalizeText(row.querySelector('.opt-b').value),
                        normalizeText(row.querySelector('.opt-c').value),
                        normalizeText(row.querySelector('.opt-d').value)
                    ];
                    return {
                        q: normalizeText(row.querySelector('.question-input').value),
                        options: opts,
                        correct: normalizeText(row.querySelector('.correct-select').value)
                    };
                }).filter(q => q.q && q.options.every(o => o));
            }

            function refreshTableDisplay() { if (domGame.tableBody.children.length === 0) resetDefaultTable(); }

            function saveTableAndClose() { gameState.pool = collectTableData(); if (gameState.pool.length === 0) {
                    resetDefaultTable();
                    gameState.pool = collectTableData(); } document.getElementById('ques-modal').style.display = 'none';
                alert("题库已保存"); }
            document.getElementById('saveQuesBtn').onclick = saveTableAndClose;
            document.getElementById('addRowBtn').onclick = () => addQuestionRow();
            document.getElementById('resetTableBtn').onclick = resetDefaultTable;
            document.getElementById('batchOpenBtn').onclick = () => document.getElementById('batch-panel').classList.remove(
                'hidden');
            document.getElementById('closeBatchBtn').onclick = () => document.getElementById('batch-panel').classList.add(
            'hidden');
            document.getElementById('clearBatchBtn').onclick = () => document.getElementById('batch-text').value = '';
            document.getElementById('importBatchBtn').onclick = () => {
                const raw = document.getElementById('batch-text').value;
                if (!raw.trim()) return alert("粘贴数据");
                const lines = raw.split(/\r?\n/);
                let added = 0;
                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;
                    let parts = line.split('|').map(s => s.trim());
                    if (parts.length < 6) { alert(`字段不足: ${line}`); continue; }
                    let [q, a, b, c, d, correct] = parts;
                    if (!q || !a || !b || !c || !d || !correct) continue;
                    if (![a, b, c, d].includes(correct)) { alert(`正确选项错误: ${correct}`); continue; }
                    addQuestionRow({ q, a, b, c, d, correct });
                    added++;
                }
                alert(`批量添加 ${added} 题`);
                document.getElementById('batch-text').value = '';
                document.getElementById('batch-panel').classList.add('hidden');
            };

            // 拔河核心
            const PULL_STEP = 22,
                MAX_SHIFT = 150;

            function clearAllTimeouts() { gameState.pendingTimeouts.forEach(id => clearTimeout(id));
                gameState.pendingTimeouts = []; }

            function addTimeout(fn, delay) { const id = setTimeout(() => { fn();
                    gameState.pendingTimeouts = gameState.pendingTimeouts.filter(t => t !== id); },
                delay);
                gameState.pendingTimeouts.push(id); return id; }

            function updateScoresAndRope() { domGame.score1.textContent = gameState.score1;
                domGame.score2.textContent = gameState.score2;
                gameState.ropePos = Math.max(-MAX_SHIFT, Math.min(MAX_SHIFT, gameState.ropePos));
                domGame.rope.style.transform = `translateX(${gameState.ropePos}px)`; if (gameState.active && Math.abs(gameState
                        .ropePos) >= MAX_SHIFT) endGame(); }

            function formatTime(sec) { return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`; }

            function updateTimerDisplay() { domGame.timer.textContent = formatTime(gameState.timeLeft); }

            function animatePull(el) { el.classList.remove('idle-float');
                el.classList.add('pull-anim');
                addTimeout(() => { if (el) { el.classList.remove('pull-anim');
                        el.classList.add('idle-float'); } }, 400); }

            function takeRandomQuestion(team) { const remaining = team === 1 ? gameState.team1Remaining : gameState
                    .team2Remaining; if (!remaining.length) return null;
                const idx = Math.floor(Math.random() * remaining.length);
                const q = remaining[idx];
                remaining.splice(idx, 1); return q; }

            function renderQuestion(team) {
                if (!gameState.active) return;
                const item = takeRandomQuestion(team);
                if (!item) { const qBox = team === 1 ? domGame.q1 : domGame.q2;
                    qBox.textContent = team === 1 ? "🐰 朱迪已完成所有题目" : "🦊 尼克已完成所有题目"; (team === 1 ? domGame.o1 : domGame.o2)
                        .innerHTML = '<div class="text-center p-4">✨ 已答完 ✨</div>'; if (gameState.active && gameState
                        .team1Remaining.length === 0 && gameState.team2Remaining.length === 0) endGame(); return; }
                const qBox = team === 1 ? domGame.q1 : domGame.q2,
                    optsBox = team === 1 ? domGame.o1 : domGame.o2;
                qBox.textContent = item.q;
                optsBox.innerHTML = '';
                const shuffled = [...item.options].sort(() => Math.random() - 0.5);
                shuffled.forEach(opt => { const btn = document.createElement('button');
                    btn.className =
                        'choice-btn w-full p-3.5 rounded-2xl font-bold text-sm bg-white border-b-4 border-slate-200 hover:bg-slate-50';
                    btn.textContent = opt;
                    btn.onclick = () => handleAnswer(team, opt, item.correct, btn, item.q);
                    optsBox.appendChild(btn); });
            }

            function handleAnswer(team, selectedOpt, correctAnswer, btn, questionText) {
                if (!gameState.active) return;
                const optsBox = team === 1 ? domGame.o1 : domGame.o2;
                optsBox.querySelectorAll('button').forEach(b => b.disabled = true);
                const isCorrect = isAnswerEqual(selectedOpt, correctAnswer);
                gameState.gameLog[team === 1 ? 'team1' : 'team2'].push({ question: questionText, userAnswer: selectedOpt,
                    correctAnswer: correctAnswer, isCorrect });
                if (isCorrect) {
                    btn.className =
                        `choice-btn w-full p-3.5 rounded-2xl font-bold text-sm text-white border-b-4 ${team===1?'bg-blue-500 border-blue-700':'bg-orange-500 border-orange-700'}`;
                    if (team === 1) { gameState.score1 += 10;
                        gameState.ropePos -= PULL_STEP;
                        animatePull(domGame.charJudy); } else { gameState.score2 += 10;
                        gameState.ropePos += PULL_STEP;
                        animatePull(domGame.charNick); }
                    updateScoresAndRope();
                    addTimeout(() => renderQuestion(team), 500);
                } else {
                    btn.className =
                        'choice-btn w-full p-3.5 rounded-2xl font-bold text-sm text-white bg-red-500 border-red-700';
                    const correctBtn = Array.from(optsBox.querySelectorAll('button')).find(b => isAnswerEqual(b.textContent,
                        correctAnswer));
                    if (correctBtn) correctBtn.className =
                        'choice-btn w-full p-3.5 rounded-2xl font-bold text-sm text-white bg-green-500 border-green-700 pull-anim';
                    addTimeout(() => renderQuestion(team), 1500);
                }
                addTimeout(() => { if (gameState.active && gameState.team1Remaining.length === 0 && gameState.team2Remaining
                        .length === 0) endGame(); }, 100);
            }

            function disableAdminButtons(disabled) { ['timeBtn', 'quizBtn', 'changePwdBtn', 'generateHtmlBtn'].forEach(id => {
                    const btn = document.getElementById(id); if (btn) disabled ? btn.classList.add('disabled-btn') :
                        btn.classList.remove('disabled-btn'); }); }

            function endGame() {
                if (!gameState.active) return;
                gameState.active = false;
                clearInterval(gameState.timerInterval);
                clearAllTimeouts();
                disableAdminButtons(false);
                const winner = gameState.ropePos < 0 ? 'JUDY' : (gameState.ropePos > 0 ? 'NICK' : 'DRAW');
                domGame.winText.textContent = winner === 'DRAW' ? '🤝 平局！' : (winner === 'JUDY' ? '🐰 朱迪胜利！' : '🦊 尼克胜利！');
                domGame.finalRes.textContent = `${gameState.score1} : ${gameState.score2}`;
                const renderReport = (teamKey, container) => {
                    const logs = gameState.gameLog[teamKey];
                    if (!logs.length) { container.innerHTML = '<p class="text-center text-slate-400">无记录</p>'; return; }
                    container.innerHTML = '';
                    logs.forEach((log, idx) => {
                        const div = document.createElement('div');
                        div.className =
                            `p-3 rounded-xl mb-2 text-xs border-l-4 ${log.isCorrect ? 'bg-green-100 border-green-500' : 'bg-red-100 border-red-500'}`;
                        div.innerHTML =
                            `<p class="font-bold">${idx+1}. ${escapeHtml(log.question)}</p>
                 <p>你的答案: ${escapeHtml(log.userAnswer)} ${log.isCorrect ? '✓' : '✗'}</p>
                 ${!log.isCorrect ? `<p class="text-slate-500">正确答案: ${escapeHtml(log.correctAnswer)}</p>` : ''}`;
                        container.appendChild(div);
                    });
                };
                renderReport('team1', domGame.judyReport);
                renderReport('team2', domGame.nickReport);
                domGame.gameOver.classList.remove('hidden');
                domGame.playAgainBtn.disabled = true;
                domGame.playAgainBtn.classList.add('opacity-50', 'cursor-not-allowed');
                domGame.downloadBtn.onclick = downloadPDFReport;
            }

        `;
                container.appendChild(headerDiv);

                const flexRow = document.createElement('div');
                flexRow.style.display = 'flex';

                judyCard.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)';

                a.download = `zootopia_tug_standalone_${Date.now()}.html`;
                a.href = URL.createObjectURL(blob);
                a.click();
                URL.revokeObjectURL(a.href);
                alert("独立HTML文件已生成，所有按钮均可正常使用！");
            }

            document.getElementById('generateHtmlBtn').onclick = () => { if (globalLocked) return;
                generateStandaloneHTML(); };

            function initGame() { loadSavedTime();
                resetDefaultTable();
                gameState.pool = collectTableData();
                gameState.team1Remaining = [...gameState.pool];
                gameState.team2Remaining = [...gameState.pool];
                domGame.gameOver.classList.add('hidden');
                updateTimerDisplay(); }
            initGame();
        })();
    </script>
</body>
</html>
